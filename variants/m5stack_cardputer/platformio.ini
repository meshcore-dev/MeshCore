[m5stack_cardputer_base]
extends = esp32_base
board = m5stack_cardputer
board_build.partitions = default_8MB.csv
build_flags =
  ${esp32_base.build_flags}
  -I variants/m5stack_cardputer
  -D M5STACK_CARDPUTER
  -D BOARD_HAS_PSRAM=1
  -D CORE_DEBUG_LEVEL=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
  -D PIN_USER_BTN=0
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CardputerRfStabilityWrapper
  -D HAS_GPS=1
  -D LORA_TX_POWER=22
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_CURRENT_LIMIT=240
  -D SX126X_RX_BOOSTED_GAIN=1
  -D SX126X_DIO3_TCXO_VOLTAGE=3.3f
  -D CARDPUTER_RF_DIAG_OVERLAY=1
  -D CARDPUTER_KEYBOARD_UI_NAV=1
  -D CARDPUTER_RF_STABILITY_MODE=1
  -D P_LORA_NSS=5
  -D P_LORA_DIO_1=4
  -D P_LORA_RESET=3
  -D P_LORA_BUSY=6
  -D P_LORA_SCLK=40
  -D P_LORA_MISO=39
  -D P_LORA_MOSI=14
  -D DISPLAY_CLASS=M5CardputerDisplay
  -D PIN_BOARD_SDA=2
  -D PIN_BOARD_SCL=1
  -D PIN_VBAT_READ=10
  -D ENV_INCLUDE_GPS=1
  -D ENV_INCLUDE_AHTX0=0
  -D ENV_INCLUDE_BME280=0
  -D ENV_INCLUDE_BMP280=0
  -D ENV_INCLUDE_SHTC3=0
  -D ENV_INCLUDE_SHT4X=0
  -D ENV_INCLUDE_LPS22HB=0
  -D ENV_INCLUDE_INA3221=0
  -D ENV_INCLUDE_INA219=0
  -D ENV_INCLUDE_INA226=0
  -D ENV_INCLUDE_INA260=0
  -D ENV_INCLUDE_MLX90614=0
  -D ENV_INCLUDE_VL53L0X=0
  -D ENV_INCLUDE_BME680=0
  -D ENV_INCLUDE_BMP085=0
  -D PIN_GPS_RX=15
  -D PIN_GPS_TX=13
  -D GPS_RX_PIN=15
  -D GPS_TX_PIN=13
  -D GPS_BAUD_RATE=115200
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/m5stack_cardputer>
lib_deps =
  ${esp32_base.lib_deps}
  stevemarple/MicroNMEA @ ^2.0.6
  M5Cardputer=https://github.com/m5stack/M5Cardputer

[env:M5stack_cardputer_cap_lora1262_companion_radio_ble]
extends = m5stack_cardputer_base
build_flags =
  ${m5stack_cardputer_base.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
  -D AUTO_OFF_MILLIS=15000
build_src_filter = ${m5stack_cardputer_base.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
  -<../examples/companion_radio/ui-cardputer-basic/*.cpp>
  +<helpers/ui/M5CardputerDisplay.cpp>
lib_deps =
  ${m5stack_cardputer_base.lib_deps}
  densaugeo/base64 @ ~1.4.0
  yoprogramo/QRcodeDisplay @ ^2.1.0

[env:M5stack_cardputer_cap_lora1262_companion_radio_usb]
extends = m5stack_cardputer_base
build_flags =
  ${m5stack_cardputer_base.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  -D AUTO_OFF_MILLIS=0
build_src_filter = ${m5stack_cardputer_base.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
  -<../examples/companion_radio/ui-cardputer-basic/*.cpp>
  +<helpers/ui/M5CardputerDisplay.cpp>
lib_deps =
  ${m5stack_cardputer_base.lib_deps}
  densaugeo/base64 @ ~1.4.0
  yoprogramo/QRcodeDisplay @ ^2.1.0
