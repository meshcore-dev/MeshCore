; ============================================================
; COMPANION RADIO - USB (serial connection to phone/PC)
; ============================================================
[env:hammer_sx1262_companion_usb]
extends = hammer
build_src_filter = ${hammer.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
build_flags =
  ${hammer.build_flags}
  -I examples/companion_radio/ui-new
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=160
  -D MAX_GROUP_CHANNELS=8
lib_deps =
  ${hammer.lib_deps}
  densaugeo/base64 @ ~1.4.0


; ============================================================
; COMPANION RADIO - BLE (Bluetooth connection to phone)
; ============================================================
[env:hammer_sx1262_companion_ble]
extends = hammer
board_build.partitions = huge_app.csv
build_src_filter = ${hammer.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
build_flags =
  ${hammer.build_flags}
  -I examples/companion_radio/ui-new
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=160
  -D MAX_GROUP_CHANNELS=8
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
lib_deps =
  ${hammer.lib_deps}
  densaugeo/base64 @ ~1.4.0


; ============================================================
; COMPANION RADIO - ETHERNET (TCP connection over W5500)
; ============================================================
[env:hammer_sx1262_companion_ethernet]
extends = hammer
board_build.partitions = huge_app.csv
build_src_filter = ${hammer.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
build_flags =
  ${hammer.build_flags}
  -I examples/companion_radio/ui-new
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=160
  -D MAX_GROUP_CHANNELS=8
  -D HAS_ETHERNET=1
  -D ETH_TCP_PORT=4403
lib_deps =
  ${hammer.lib_deps}
  densaugeo/base64 @ ~1.4.0
  sstaub/Ethernet3 @ ^1.6.0


; ============================================================
; REPEATER + ESPNow BRIDGE
; ============================================================
[env:hammer_sx1262_repeater_bridge_espnow]
extends = hammer
build_src_filter = ${hammer.build_src_filter}
  +<helpers/bridges/ESPNowBridge.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/simple_repeater/*.cpp>
build_flags =
  ${hammer.build_flags}
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D DISPLAY_CLASS=SSD1306Display
  -D ADVERT_NAME='"Hammer ESPNow Bridge"'
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D WITH_ESPNOW_BRIDGE=1
lib_deps =
  ${hammer.lib_deps}
  ${esp32_ota.lib_deps}
