; ============================================================
; Broken Circuit Ranch Hammer Board Variant builds
; www.brokencircuitranch.com
; ============================================================

[hammer]
extends = esp32_base
board = esp32doit-devkit-v1
build_flags =
  ${esp32_base.build_flags}
  -I variants/hammer
  -D HAMMER_BOARD
  -D HAS_SCREEN
  -D ENV_INCLUDE_GPS=1
  -D PIN_GPS_RX=15
  -D PIN_GPS_TX=12
  -D GPS_BAUD_RATE=9600
  -D P_LORA_DIO_1=33
  -D P_LORA_NSS=18
  -D P_LORA_RESET=23
  -D P_LORA_BUSY=32
  -D P_LORA_SCLK=5
  -D P_LORA_MOSI=27
  -D P_LORA_MISO=19
  -D SX126X_TXEN=13
  -D SX126X_RXEN=14
  -D PIN_BOARD_SDA=21
  -D PIN_BOARD_SCL=22
  -D SX126X_DIO2_AS_RF_SWITCH=false
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D LORA_TX_POWER=22
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/hammer>
lib_deps =
  ${esp32_base.lib_deps}
  stevemarple/MicroNMEA @ ^2.0.6
  adafruit/Adafruit SSD1306 @ ^2.5.13


; ============================================================
; REPEATER
; ============================================================
[env:hammer_sx1262_repeater]
extends = hammer
build_src_filter = ${hammer.build_src_filter}
  +<../examples/simple_repeater/*.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
build_flags =
  ${hammer.build_flags}
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D DISPLAY_CLASS=SSD1306Display
  -D ADVERT_NAME='"Hammer Repeater"'
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
lib_deps =
  ${hammer.lib_deps}
  ${esp32_ota.lib_deps}


; ============================================================
; ROOM SERVER
; ============================================================
[env:hammer_sx1262_room_server]
extends = hammer
build_src_filter = ${hammer.build_src_filter}
  +<../examples/simple_room_server/*.cpp>
