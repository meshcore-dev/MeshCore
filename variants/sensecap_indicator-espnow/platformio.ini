[SenseCapIndicator-ESPNow]
extends = esp32_base
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partition-table-8MB.csv
build_flags =
  ${esp32_base.build_flags}
  -D PIN_BOARD_SDA=39
  -D PIN_BOARD_SCL=40
  -D DISPLAY_CLASS=SCIndicatorDisplay
  -D DISPLAY_LINES=21
  -D LINE_LENGTH=53
  -D DISABLE_WIFI_OTA=1
  -D IO_EXPANDER=0x40
  -D IO_EXPANDER_IRQ=42
  -D UI_ZOOM=3.5
  -D UI_RECENT_LIST_SIZE=9
  -D UI_SENSORS_PAGE=1
  -D PIN_USER_BTN=38
  -D HAS_TOUCH
  -I variants/sensecap_indicator-espnow
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/sensecap_indicator-espnow/*.cpp>
  +<helpers/esp32/ESPNOWRadio.cpp>
  +<helpers/ui/LGFXDisplay.cpp>
  +<helpers/sensors/*>
lib_deps=${esp32_base.lib_deps}
  adafruit/Adafruit BusIO @ ^1.17.2
  lovyan03/LovyanGFX @ ^1.2.7

[env:SenseCapIndicator-ESPNow_comp_radio_usb]
extends =SenseCapIndicator-ESPNow
build_flags =
  ${SenseCapIndicator-ESPNow.build_flags}
  ; -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D CORE_DEBUG_LEVEL=4  ; 0: None, 1: Error, 2: Warn, 3: Info, 4: Debug, 5: Verbose
	-D LV_CONF_PATH=lv_conf.h
  -D SEEED_SENSECAP_INDICATOR
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=SenseCapSX1262Wrapper
  -D PIN_USER_BTN=38
  -D LANG_EN
  -D LORA_FREQ=869.525
  -D LORA_BW=250.0
  -D LORA_SF=11
  -D LORA_CR=5
  -D LORA_TX_POWER=20
  -D SX126X_DIO3_TCXO_VOLTAGE=2.4
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D ADVERT_NAME='"SenseCap Client"'
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=8
  -D MESH_DEBUG=1
  -D RADIOLIB_SPI_PARANOID=0

; NOTE: DO NOT ENABLE -->  -D MESH_PACKET_LOGGING=1
; NOTE: DO NOT ENABLE -->  -D MESH_DEBUG=1
; NOTE: DO NOT ENABLE -->  -D ESPNOW_DEBUG_LOGGING=1
build_src_filter = ${SenseCapIndicator-ESPNow.build_src_filter}
  +<../examples/simple_secure_chat_ui/*.cpp>
  +<fonts/*.c>
  +<UI/*.c>
lib_deps =
  ${SenseCapIndicator-ESPNow.lib_deps}
  fbiego/ESP32Time@^2.0.6
  lvgl/lvgl@8.3.11
  lovyan03/LovyanGFX@^1.2.7
  bitbank2/PNGdec@^1.1.6
  densaugeo/base64 @ ~1.4.0
